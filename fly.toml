# fly.toml app configuration file generated for caf-gpt on 2025-02-13T17:30:28-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'caf-gpt'
primary_region = 'yul'

[build]
dockerfile = "Dockerfile"

[deploy]
  strategy = "immediate"

[env]
  DEVELOPMENT = "true"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = "256mb"