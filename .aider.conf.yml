architect: true

watch-files: true
# max-chat-history-tokens: 32768
# restore-chat-history: true
read:
  - ".appLogic/"
  - "prompt.md"
file:
  - "src/main.py"
  - "src/types.py"

auto-commits: false
attribute-commit-message-author: true
auto-lint: true
lint-cmd: 
  - "pylint --rcfile=.pylintrc src/"
# auto-test: true  
# test-cmd: "npm run test"

# map-tokens: 4096
map-refresh: always

editor: neovim