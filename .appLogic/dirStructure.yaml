caf-gpt:
  .appLogic:  # Application documentation
    - overview.md: Main project documentation
    - emailModule.md: Email processing module documentation
    - llmModule.md: LLM processing module documentation
    - dirStructure.yaml: Project structure documentation
  notepad:  # Development notes and analysis
  src:
    main.py: Application entry point
    types.py: Global type definitions
    tests:  # Test files
      utils:  # Utility tests
        - test_rate_limiter.py: Rate limiter tests
        - test_logger.py: Logging system tests
      emails:  # Email module tests
        - test_email_processor.py: Email processor tests
        - test_imap_connection.py: IMAP connection tests
        - test_email_parser.py: Email parser tests
        - test_email_queue.py: Queue implementation tests
    utils:  # Server utilities
      - __init__.py: Module exports
      - config.py: Configuration management
      - logger.py: Centralized logging system
      - types.py: Type definitions and validation
    emails:  # Email processing module
      - __init__.py: Module exports
      - manager.py: Queue management and processing orchestration
      - connection.py: IMAP connection management
      - parser.py: Email content parsing
      - detector.py: System detection based on email addresses
      - queue.py: Thread-safe message queue
    llm:  # LLM integration
      - __init__.py: LLM Router implementation and email marking
    llm/pace_note:  # Pace Notes handler
      - __init__.py: PaceNote handler implementation
      - agent.py: Processing logic
    llm/policy_foo:  # Policy handler (planned)
      - __init__.py: Policy handler implementation
      - agent.py: Processing logic
  .cursor:  # IDE configuration
    rules:
      - applogic.mdc: App Logic rules
      - debugging.mdc: Debugging rules
      - new-feature.mdc: Feature implementation rules
      - notepad.mdc: Development notes guidelines
  # Configuration files
  .env.example: Environment variables template
  .envrc: Direnv configuration
  shell.nix: Nix development environment
  .pylintrc: Pylint configuration
  requirements.txt: Python dependencies
  Dockerfile: Container definition
  .dockerignore: Docker ignore patterns
  .gitignore: Git ignore patterns