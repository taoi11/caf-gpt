<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Finder - CAF-GPT Tools</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/policyFoo.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-left">
                <h1>Policy Finder</h1>
                <a href="/" class="button">Back to Tools</a>
                <select id="policy-selector" class="policy-selector">
                    <option value="doadFoo">DOAD Policy</option>
                </select>
            </div>
            <div class="nav-links">
                <div class="info-box rate-box">
                    <div class="rate-line">
                        <span>Hourly:</span>
                        <span class="hourly-remaining">-</span>
                    </div>
                    <div class="rate-line">
                        <span>Daily:</span>
                        <span class="daily-remaining">-</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="chat-container">
            <div id="chat-history" class="chat-history"></div>
            <div class="input-container">
                <textarea 
                    id="user-input" 
                    placeholder="Ask about CAF policies... (Press Ctrl+Enter to send)"
                    rows="3"
                    aria-label="Enter your policy question"
                ></textarea>
                <button id="send-button" class="button">Send</button>
            </div>
        </div>
    </main>

    <script type="module" src="/js/policyFoo.js"></script>
</body>
</html>
