<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pace Notes - CAF-GPT Tools</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/paceNote.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-left">
                <h1>Pace Notes</h1>
                <a href="/" class="button">Back to Tools</a>
            </div>
            <div class="nav-links">
                <div class="info-box rate-box">
                    <div class="rate-line">
                        <span>Hour:</span>
                        <span class="hourly-remaining">-</span>
                    </div>
                    <div class="rate-line">
                        <span>Day:</span>
                        <span class="daily-remaining">-</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Input Section -->
        <section class="input-section">
            <textarea 
                class="input-box" 
                placeholder="I ordered pizza for the shop and it improved morale. (Press Ctrl+Enter to generate)"
                aria-label="Enter your observations"
            ></textarea>
            <div class="submit-container">
                <select id="rank-select" class="rank-select" aria-label="Select Rank" required>
                    <option value="">Select Rank</option>
                    <option value="cpl-mcpl">Cpl/MCpl</option>
                    <!-- <option value="sgt">Sgt</option> -->
                </select>
                <button class="button" id="generate-btn" disabled>Generate Pace Notes</button>
            </div>
        </section>

        <!-- Output Section -->
        <section class="output-section">
            <!-- Output boxes will be dynamically inserted here -->
        </section>
    </main>

    <script type="module" src="/js/paceNotes.js"></script>
</body>
</html>
